version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: job_recommendation_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: job_recommendation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: job_recommendation_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/job_recommendation
      - SECRET_KEY=super-secret-production-key-change-it-immediately-1234
      - UPLOAD_DIR=/app/uploads/resumes
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads/resumes
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: job_recommendation_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
